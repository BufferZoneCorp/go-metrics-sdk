name: go-metrics-sdk
ecosystem: golang
type: malicious
category: layered
attack_vectors:
  - dependency-confusion
  - build-time-execution
  - test-time-execution
techniques:
  - init-function-payload
  - github-env-file-poisoning
  - goproxy-substitution
  - gosum-poisoning
  - module-cache-eviction
  - ip-address-obfuscation
  - persistent-binary-backdoor
impersonates: github.com/BufferZoneCorp/go-metrics-sdk (legitimate-looking metrics SDK)
mirrors_incident: "Novel technique — GOPROXY substitution + go.sum poisoning via init() (2026)"
payload_actions:
  - github-env-write
  - module-cache-evict
  - gosum-strip
  - goproxy-override
  - gosumdb-disable
  - logrus-zip-inject
  - binary-beacon-compile
exfil_method: http-post-env-vars
expected_signals:
  - "init() with os.Getenv('GITHUB_ENV')"
  - "os.OpenFile on GITHUB_ENV with O_WRONLY"
  - "writes GOPROXY / GOSUMDB to $GITHUB_ENV"
  - "exec.Command('go', 'env', 'GOPATH') — resolving module cache path"
  - "os.RemoveAll on GOPATH/pkg/mod/cache/download/github.com/sirupsen/logrus"
  - "os.ReadFile / os.WriteFile on go.sum — stripping checksum entries"
  - "IP address list (_peers) decoded as ASCII bytes by _resolve()"
  - "downstream go build fetches from attacker GOPROXY (GOSUMDB=off)"
  - "compiled binary contains beacon init() in logrus package"
description: >
  Impersonates a legitimate metrics SDK. The init() function fires on both
  `go test` and `go run`. When GITHUB_ENV is present (GitHub Actions) it:

  1. Decodes the attacker C2 URL from _peers — a list of IPv4 addresses whose
     octets encode ASCII bytes (IP address obfuscation, harder to detect than
     string literals or XOR).

  2. Evicts github.com/sirupsen/logrus from the local module cache so Go is
     forced to re-download it from GOPROXY on the next build.

  3. Strips logrus entries from go.sum so the attacker's hash is accepted
     without mismatch errors.

  4. Writes to $GITHUB_ENV:
       GOPROXY=<attacker>|direct
       GOSUMDB=off
       GONOSUMDB=*
       GOFLAGS=-mod=mod
     All subsequent workflow steps use the attacker's proxy.

  On the next `go build`, the attacker's GOPROXY serves a modified logrus zip
  that includes a _beacon.go file.  The beacon:
    - Fires a goroutine 150ms after process init
    - Collects all environment variables (GH_TOKEN, AWS_*, etc.)
    - POSTs them to the attacker's /collect endpoint

  The payload is compiled into the binary — it persists across every run.
  The original logrus API is fully preserved so the application behaves
  normally.  The go.sum is updated with the attacker's hash (-mod=mod).

  The default proxy endpoint decodes from _peers to http://localhost:9292
  (the benchmark collector).  Override with PKG_ANALYTICS_URL.

  Unlike pure proxy-hijacking attacks, the poisoning survives pipeline
  restarts: the binary is already compromised.
